specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Sentry
providerId: sentry-system
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Error Tracking
  - Observability
  - Performance Monitoring
  - APM
  - Session Replay
description: Sentry prices on tiered subscriptions with included event/session/log volumes plus per-unit
  overage. Developer is free for 1 user; Team and Business unlock unlimited users at $26/mo and $80/mo
  (annual billing) respectively. Both Team and Business publish per-unit overage rates for logs/metrics
  ($0.50/GB), uptime alerts ($1.00 each), and cron monitors ($0.78 each). Enterprise is custom-priced.
sources:
  - https://sentry.io/pricing/
plans:
  - id: sentry-system-developer
    name: Developer
    type: freemium
    description: Free tier for a single user. Includes 5,000 errors, 5 GB logs, 5M spans, 50 session
      replays, 1 uptime monitor, 1 cron monitor. Email alerts and 10 custom dashboards.
    entries:
      - label: Subscription
        name: subscription
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '$0'
        userMultiplied: false
      - label: Users
        name: users
        type: quota
        metric: seat
        limit: 1
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Errors
        name: errors
        type: quota
        metric: errors
        limit: 5000
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Logs
        name: logs
        type: quota
        metric: GB
        limit: 5
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Spans
        name: spans
        type: quota
        metric: spans
        limit: 5000000
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Session Replays
        name: replays
        type: quota
        metric: replays
        limit: 50
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Uptime Monitors
        name: uptime_monitors
        type: quota
        metric: monitors
        limit: 1
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Cron Monitors
        name: cron_monitors
        type: quota
        metric: monitors
        limit: 1
        geo: global
        unit: 1
        price: included
        userMultiplied: false
    elements:
      - name: Error monitoring
      - name: Tracing
      - name: Email alerts
      - name: 10 custom dashboards
  - id: sentry-system-team
    name: Team
    type: subscription
    description: Team plan at $26/month (annual billing) with unlimited users. Same baseline volumes
      as Developer plus third-party integrations, 20 custom dashboards, and an opt-in AI debugging agent
      (subscription required). Per-unit overage on logs, uptime alerts, and cron monitors.
    entries:
      - label: Subscription
        name: subscription
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '$26/mo (annual billing)'
        userMultiplied: false
      - label: Users
        name: users
        type: quota
        metric: seat
        limit: -1
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Errors
        name: errors
        type: quota
        metric: errors
        limit: 50000
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Logs / Metrics overage
        name: logs_metrics_overage
        type: metered
        metric: GB
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '$0.50/GB'
        userMultiplied: false
      - label: Uptime Alerts overage
        name: uptime_alerts_overage
        type: metered
        metric: alert
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '$1.00 each'
        userMultiplied: false
      - label: Cron Monitors overage
        name: cron_monitors_overage
        type: metered
        metric: monitor
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '$0.78 each'
        userMultiplied: false
    elements:
      - name: All Developer features
      - name: Unlimited users
      - name: Third-party integrations
      - name: 20 custom dashboards
      - name: AI debugging agent (subscription required)
  - id: sentry-system-business
    name: Business
    type: subscription
    description: Business plan at $80/month (annual billing) with unlimited users. Same volume baseline
      and overage rates as Team, plus 90-day insights lookback, unlimited custom dashboards, unlimited
      metric alerts with anomaly detection, advanced quota management, and SAML + SCIM support.
    entries:
      - label: Subscription
        name: subscription
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '$80/mo (annual billing)'
        userMultiplied: false
      - label: Users
        name: users
        type: quota
        metric: seat
        limit: -1
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Errors
        name: errors
        type: quota
        metric: errors
        limit: 50000
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Logs / Metrics overage
        name: logs_metrics_overage
        type: metered
        metric: GB
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '$0.50/GB'
        userMultiplied: false
      - label: Uptime Alerts overage
        name: uptime_alerts_overage
        type: metered
        metric: alert
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '$1.00 each'
        userMultiplied: false
      - label: Cron Monitors overage
        name: cron_monitors_overage
        type: metered
        metric: monitor
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '$0.78 each'
        userMultiplied: false
    elements:
      - name: All Team features
      - name: 90-day insights lookback
      - name: Unlimited custom dashboards
      - name: Unlimited metric alerts with anomaly detection
      - name: Advanced quota management
      - name: SAML + SCIM
  - id: sentry-system-enterprise
    name: Enterprise
    type: enterprise
    description: Custom-priced plan with technical account manager, dedicated customer support, and customizable
      limits across all services.
    entries:
      - label: Subscription
        name: subscription
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: custom
        userMultiplied: false
    elements:
      - name: All Business features
      - name: Customizable limits
      - name: Technical Account Manager
      - name: Dedicated support
