specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Sentry
providerId: sentry-system
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Error Tracking
  - Observability
  - FinOps
  - FOCUS
description: FOCUS-aligned FinOps shape for Sentry — tiered SaaS subscription with multiple consumption
  meters (errors, logs/metrics, spans, replays, uptime monitors, cron monitors). Team and Business plans
  publish per-unit overage prices ($0.50/GB logs, $1.00/uptime alert, $0.78/cron monitor); Developer hard-caps
  on free quota; Enterprise is custom.
sources:
  - https://sentry.io/pricing/
  - https://docs.sentry.io/api/ratelimits/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Functional Software, Inc. (Sentry)
serviceCategory: Observability / APM
billingModel:
  pricingCategory: Tiered Subscription + Pay-As-You-Go
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
focusColumns:
  ServiceName: Sentry
  ServiceCategory: Observability / APM
  ProviderName: Sentry
  PublisherName: Functional Software, Inc.
  InvoiceIssuerName: Functional Software, Inc.
  BillingCurrency: USD
meters:
  - name: errors
    description: Captured error events
    unit: error
    aggregation: sum
    dimensions:
      - organization
      - project
      - environment
  - name: logs_metrics
    description: Logs and metrics ingested in GB (overage billed at $0.50/GB on Team/Business)
    unit: GB
    aggregation: sum
    dimensions:
      - organization
      - project
  - name: spans
    description: Tracing spans ingested
    unit: span
    aggregation: sum
    dimensions:
      - organization
      - project
  - name: session_replays
    description: Session Replay recordings ingested
    unit: replay
    aggregation: sum
    dimensions:
      - organization
      - project
  - name: uptime_monitors
    description: Active uptime monitors / alerts (overage at $1.00/alert on Team/Business)
    unit: alert
    aggregation: sum
    dimensions:
      - organization
  - name: cron_monitors
    description: Active cron monitors (overage at $0.78/monitor on Team/Business)
    unit: monitor
    aggregation: sum
    dimensions:
      - organization
  - name: subscription_fee
    description: Recurring monthly plan fee (Team $26/mo, Business $80/mo, Enterprise custom)
    unit: month
    aggregation: sum
    dimensions:
      - plan
principles:
  - name: Visibility
    description: Use the Stats / Usage page in the Sentry UI plus the /api/0/organizations/{org}/stats_v2/
      endpoint to break consumption down by project, category (error/transaction/replay/log), and time
      bucket. Spending alerts can be configured from the same screen.
  - name: Allocation
    description: Sentry organizations and projects are the natural allocation units. Tag events with
      release, environment, and team metadata to attribute consumption to product squads.
  - name: Optimization
    description: Use server-side and client-side sampling to control transaction/span volume; configure
      inbound filters to drop noisy / non-actionable errors; tune session replay sample rate per project.
      Advanced Quota Management on Business lets you cap per-project spend to prevent runaway billing.
  - name: Accountability
    description: Engineering owners of each project are accountable for their event volume. Platform
      / SRE owns the org-level subscription and overage budget; finance reviews monthly Sentry invoice
      against the plan.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
